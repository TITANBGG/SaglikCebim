<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d6a4f"/>
      <stop offset="100%" stop-color="#40916c"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d8f3dc"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="120" height="120" rx="26" fill="url(#bg)"/>
  <!-- Stethoscope/Health symbol -->
  <g transform="translate(60,56)">
    <!-- Heart shape -->
    <path d="M0,-8 C-4,-18 -18,-18 -18,-6 C-18,4 0,16 0,16 C0,16 18,4 18,-6 C18,-18 4,-18 0,-8Z" 
          fill="url(#cross)" opacity="0.95"/>
    <!-- Pulse line -->
    <path d="M-30,0 L-12,0 L-8,-12 L-3,10 L3,-14 L8,8 L12,0 L30,0" 
          fill="none" stroke="#b7e4c7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
          transform="translate(0,22)"/>
  </g>
  <!-- AI dot accent -->
  <circle cx="98" cy="22" r="8" fill="#95d5b2" opacity="0.9"/>
  <circle cx="98" cy="22" r="4" fill="#ffffff"/>
</svg>
